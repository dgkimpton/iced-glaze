
[workspace]
resolver = "2"
members=["fancybutton","glazed"]
default-members=["glazed"]

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage,coverage_nightly)'] }

[workspace.dependencies]
fancybutton = { path = "./fancybutton" }
iced = { git = "https://github.com/iced-rs/iced",  branch = "0.14",  features=["advanced"] }
